<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty Website</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        header { background: #003366; color: white; padding: 10px 20px; text-align: center; }
        nav { margin: 20px 0; }
        nav a { color: white; margin: 0 15px; text-decoration: none; }
        .container { padding: 20px; }
        /* Responsive Design */
        @media (max-width: 600px) {
            header { font-size: 1.2em; }
            nav a { display: block; margin: 10px 0; }
        }
        /* Animations */
        .fade-in { animation: fadeIn 2s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to Our Faculty Website</h1>
        <nav>
            <a href="#about">About</a>
            <a href="#courses">Courses</a>
            <a href="#contact">Contact</a>
        </nav>
    </header>
    <div class="container fade-in">
        <section id="about">
            <h2>About Us</h2>
            <p>This is where you can learn more about our faculty and staff.</p>
        </section>
        <section id="courses">
            <h2>Courses</h2>
            <p>Details about the courses we offer.</p>
        </section>
        <section id="contact">
            <h2>Contact Us</h2>
            <p>Contact form or contact details.</p>
        </section>
    </div>
</body>
</html>
